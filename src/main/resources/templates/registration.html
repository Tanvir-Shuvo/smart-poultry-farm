<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | Smart Poultry Farm</title>

    <!-- Bootstrap -->

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <!-- Common CSS -->

    <link rel="stylesheet" href="/css/style.css">

    <!-- Register CSS -->

    <link rel="stylesheet" href="/css/register.css">

</head>

<body>

<div class="register-container">

    <div class="register-card shadow-lg">

        <!-- HEADER -->

        <div class="text-center mb-4">

            <h1 class="main-title">
                Smart Poultry Farm
            </h1>

            <p class="sub-title">
                Create your account
            </p>

        </div>

        <!-- REGISTER FORM -->

        <form action="/registration"
              method="post">

            <!-- FULL NAME -->

            <div class="mb-3">

                <label class="form-label">
                    Full Name
                </label>

                <input
                        type="text"
                        name="name"
                        class="form-control custom-input"
                        placeholder="Enter your full name"
                        required>

            </div>

            <!-- EMAIL -->

            <div class="mb-3">

                <label class="form-label">
                    Email Address
                </label>

                <input
                        type="email"
                        name="email"
                        class="form-control custom-input"
                        placeholder="Enter your email"
                        required>

            </div>

            <!-- PASSWORD -->

            <div class="mb-3">

                <label class="form-label">
                    Password
                </label>

                <input
                        type="password"
                        name="password"
                        class="form-control custom-input"
                        placeholder="Create password"
                        required>

            </div>

            <!-- CONFIRM PASSWORD -->

            <div class="mb-4">

                <label class="form-label">
                    Confirm Password
                </label>

                <input
                        type="password"
                        name="confirmPassword"
                        class="form-control custom-input"
                        placeholder="Confirm password"
                        required>

            </div>

            <!-- REGISTER BUTTON -->

            <button
                    type="submit"
                    class="btn btn-primary w-100 register-btn">

                Create Account

            </button>

        </form>

        <!-- LOGIN LINK -->

        <div class="text-center mt-4">

            <p class="login-text">

                Already have an account?

                <a href="/login">
                    Login
                </a>

            </p>

        </div>

    </div>

</div>

</body>
</html>
