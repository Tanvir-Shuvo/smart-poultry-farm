<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Smart Poultry Farm</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Common CSS -->
    <link rel="stylesheet" href="/css/style.css">

    <!-- Login CSS -->
    <link rel="stylesheet" href="/css/login.css">

</head>

<body>

<div class="login-container">

    <div class="login-card shadow-lg">

        <!-- HEADER -->
        <div class="text-center mb-4">

            <h1 class="main-title">Smart Poultry Farm</h1>

            <p class="sub-title">Login to continue</p>

        </div>

        <!-- ERROR MESSAGE (NEW ADDED) -->
        <div th:if="${error}" class="alert alert-danger text-center py-2">
            <span th:text="${error}"></span>
        </div>

        <!-- LOGIN FORM -->
        <form action="/login" method="post">

            <!-- EMAIL -->
            <div class="mb-3">

                <label class="form-label">Email Address</label>

                <input type="email"
                       name="email"
                       class="form-control custom-input"
                       placeholder="Enter your email"
                       required>

            </div>

            <!-- PASSWORD -->
            <div class="mb-4">

                <label class="form-label">Password</label>

                <input type="password"
                       name="password"
                       class="form-control custom-input"
                       placeholder="Enter your password"
                       required>

            </div>

            <!-- LOGIN BUTTON -->
            <button type="submit"
                    class="btn btn-primary w-100 login-btn">

                Login

            </button>

        </form>

        <!-- REGISTER -->
        <div class="text-center mt-4">

            <p class="register-text">

                Don't have an account?

                <a href="/registration">Register</a>

            </p>

        </div>

    </div>

</div>

</body>
</html>
