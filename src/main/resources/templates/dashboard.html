<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - PoultryCare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<!-- TOP NAV -->
<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand fw-bold">🐔 PoultryCare</a>

    <a href="/logout" class="btn btn-danger btn-sm">
        <i class="fa fa-right-from-bracket"></i> Logout
    </a>
</nav>

<!-- WELCOME -->
<div class="container mt-4">

    <div class="alert alert-success">
        Welcome to Smart Poultry Farm Dashboard
    </div>

    <!-- CARDS -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="card shadow-sm p-3 text-center">
                <i class="fa fa-drumstick-bite fa-2x text-primary"></i>
                <h5 class="mt-2">Chicken</h5>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-3 text-center">
                <i class="fa fa-wheat-awn fa-2x text-success"></i>
                <h5 class="mt-2">Feed</h5>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-3 text-center">
                <i class="fa fa-chart-line fa-2x text-warning"></i>
                <h5 class="mt-2">Sales</h5>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow-sm p-3 text-center">
                <i class="fa fa-file fa-2x text-danger"></i>
                <h5 class="mt-2">Reports</h5>
            </div>
        </div>

    </div>

</div>

</body>
</html>
