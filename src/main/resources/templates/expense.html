<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Expense - Smart Murgi</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/expense.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-success shadow-sm px-3">

    <div>
        <h4 class="text-white m-0">🐔 Smart Murgi</h4>
    </div>

    <div>
        <a href="/dashboard" class="btn btn-light btn-sm">
            ← Dashboard
        </a>
    </div>

</nav>

<!-- MAIN -->
<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <!-- CARD -->
            <div class="expense-card">

                <div class="text-center mb-4">

                    <div class="expense-icon">
                        <i class="fa-solid fa-money-bill-wave"></i>
                    </div>

                    <h2 class="mt-3">Add Daily Expense</h2>

                    <p class="text-muted">
                        Track your farm expenses easily 💸
                    </p>

                </div>

                <!-- FORM -->
                <form action="/saveExpense" method="post">

                    <!-- TITLE -->
                    <div class="mb-3">

                        <label class="form-label">
                            Expense Title
                        </label>

                        <input type="text"
                               name="title"
                               class="form-control custom-input"
                               placeholder="Example: Feed Purchase"
                               required>

                    </div>

                    <!-- AMOUNT -->
                    <div class="mb-3">

                        <label class="form-label">
                            Amount (৳)
                        </label>

                        <input type="number"
                               name="amount"
                               class="form-control custom-input"
                               placeholder="Enter amount"
                               required>

                    </div>

                    <!-- DATE -->
                    <div class="mb-4">

                        <label class="form-label">
                            Date
                        </label>

                        <input type="date"
                               name="date"
                               class="form-control custom-input"
                               required>

                    </div>

                    <!-- BUTTON -->
                    <button type="submit"
                            class="btn btn-success w-100 custom-btn">

                        <i class="fa-solid fa-plus"></i>
                        Save Expense

                    </button>

                </form>


                <!-- SUCCESS MESSAGE -->
                <div th:if="${success}"
                     class="alert alert-success text-center">

                    <span th:text="${success}"></span>

                    <br><br>

                    <a href="/dashboard"
                       class="btn btn-success btn-sm">

                        Go To Dashboard

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
